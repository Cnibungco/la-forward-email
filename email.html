<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA Forward — One-Click Email</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="org">LA Forward</p>
      <h1 id="campaign-title">Loading…</h1>
    </header>

    <section class="instructions">
      <p id="instructions-text">This opens your email app with a pre-written message. Review it, add your name and address, then send.</p>
    </section>

    <section id="action-section" class="action">
      <a id="email-cta" class="cta" href="#">Email your representatives</a>
      <p id="recipient-note" class="recipient-note"></p>
    </section>

    <section id="preview-section" class="preview" aria-labelledby="preview-heading">
      <h2 id="preview-heading">Message preview</h2>
      <p class="preview-label">Subject</p>
      <p id="preview-subject" class="preview-subject"></p>
      <p class="preview-label">Body</p>
      <pre id="preview-body" class="preview-body"></pre>
    </section>
  </main>

  <script src="lib/buildMailtoUrl.js"></script>
  <script src="lib/campaignCodec.js"></script>
  <script src="js/email.js"></script>
</body>
</html>
